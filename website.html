<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Congratulations QR</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      overflow: hidden;
    }

    #message {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.4);
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    #trigger {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- Invisible overlay that triggers the message on tap -->
  <div id="trigger"></div>

  <!-- The congratulations message -->
  <h1 id="message">Congratulations!</h1>

  <script>
    // Show "Congratulations!" only after user taps/clicks
    document.getElementById("trigger").addEventListener("click", function () {
      const message = document.getElementById("message");
      message.style.opacity = "1";
      // Optional: also show an alert popup
      // alert("Congratulations!");
    });
  </script>
</body>
</html>
